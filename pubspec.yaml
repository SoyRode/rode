name: itp_irpf_calculator
description: "Aplicación para calcular impuestos inmobiliarios en Uruguay (ITP e IRPF)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0

  # HTTP & Networking
  dio: ^5.3.0
  http: ^1.1.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0

  # Date & Time
  intl: ^0.19.0

  # PDF Generation
  pdf: ^3.10.0
  printing: ^5.11.0

  # Image & Graphics
  image: ^4.0.0
  flutter_svg: ^2.0.0

  # UI Components
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.1.0
  cupertino_icons: ^1.0.2

  # Logging
  logger: ^2.1.0

  # Connectivity
  connectivity_plus: ^5.0.0
  internet_connection_checker: ^1.0.0

  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.0.0

  # Notifications
  flutter_local_notifications: ^16.0.0

  # Share
  share_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

  # Testing
  mockito: ^5.4.0
  mocktail: ^1.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/icons/
    - assets/images/illustrations/
    - assets/fonts/
    - .env

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600

    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
